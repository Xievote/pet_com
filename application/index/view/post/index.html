<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>帖子列表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .post-list {
            margin-top: 20px;
        }
        .post-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .post-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .post-actions {
            text-align: right;
        }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 10px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .btn-secondary {
            background-color: #f44336;
        }
        .btn-secondary:hover {
            background-color: #da190b;
        }
        .create-post {
            text-align: right;
            margin-bottom: 20px;
        }
        .pagination {
            margin-top: 20px;
            text-align: center;
        }
        .pagination a {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 5px;
            background-color: #f1f1f1;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
        }
        .pagination a:hover {
            background-color: #ddd;
        }
        .pagination .current {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 5px;
            background-color: #4CAF50;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>帖子列表</h1>
        <div class="create-post">
            <a href="{:url('Post/create')}" class="btn">创建新帖子</a>
        </div>
        <div class="post-list">
            {volist name="posts" id="post"}
            <div class="post-item">
                <div class="post-title">
                    <a href="{:url('Post/detail', ['id' => $post.id])}">{$post.title}</a>
                </div>
                <div class="post-info">
                    作者：{$post.user.username} | 发布时间：{$post.created_at|date='Y-m-d H:i:s'}
                </div>
                <div class="post-content">
                    {$post.content|substr=0,100}...
                </div>
                {if condition="session('user_id') == $post.user_id"}
                <div class="post-actions">
                    <a href="{:url('Post/edit', ['id' => $post.id])}" class="btn">编辑</a>
                    <a href="{:url('Post/delete', ['id' => $post.id])}" class="btn btn-secondary" onclick="return confirm('确定要删除此帖子吗？');">删除</a>
                </div>
                {/if}
            </div>
            {/volist}
        </div>
        <div class="pagination">
            {$posts|raw}
        </div>
    </div>
</body>
</html>
